# coturn config for the WebRTC voice mesh. Uses ephemeral REST credentials
# (use-auth-secret) — the app server mints short-lived HMAC creds; the static
# secret never reaches clients. Set static-auth-secret and external-ip via the
# entrypoint env substitution in docker-compose.

listening-port=3478
tls-listening-port=5349

# Relay range (must be published in docker-compose ports).
min-port=49160
max-port=49200

fingerprint
use-auth-secret
# static-auth-secret is injected at container start from $TURN_STATIC_AUTH_SECRET
realm=akpoker

# Hardening
no-cli
no-multicast-peers
no-tlsv1
no-tlsv1_1
# Deny relaying to internal ranges (anti-SSRF).
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255

# external-ip is injected at container start from $TURN_EXTERNAL_IP
